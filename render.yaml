# Render Blueprint — deploy the Millionaire Quiz on Render's free tier.
#
# One-time setup:
#   1. Create a free PostgreSQL database (Neon — https://neon.tech — recommended,
#      or Render's own free Postgres) and copy its connection string.
#   2. In Render: New > Blueprint, and point it at this repository.
#   3. When prompted, paste the Postgres connection string as DATABASE_URL.
#      JWT_SECRET is generated for you. Deploy.
#
# Notes:
#   - This is a persistent Node process with WebSockets (Socket.IO), so it runs as
#     a "web" service, NOT a static site or serverless function.
#   - The free instance spins down after ~15 min idle and wakes in ~50s. Open the
#     host page first to wake it, then share the join code.
#   - NODE_ENV is intentionally NOT set here: the build needs dev dependencies
#     (Next compiler, Tailwind, tsx, Prisma CLI). The `start` script sets
#     NODE_ENV=production itself via cross-env.

services:
  - type: web
    name: millionaire-quiz
    runtime: node
    plan: free
    autoDeploy: true
    healthCheckPath: /
    buildCommand: >-
      npm install &&
      npm run use:postgres &&
      npx prisma generate &&
      npx prisma db push --accept-data-loss &&
      npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: JWT_SECRET
        generateValue: true
      # Pins the encryption key Next.js uses to salt Server Action IDs. Without a
      # stable key, every deploy regenerates the key and changes all action IDs,
      # so any already-open browser tab POSTs a stale ID and gets a 404
      # ("Server action not found") — e.g. the New Game button hanging on
      # "Saving…". generateValue emits a base64 256-bit key (Next's required
      # format) and persists it across deploys, keeping action IDs stable.
      - key: NEXT_SERVER_ACTIONS_ENCRYPTION_KEY
        generateValue: true
      - key: SOCKET_CORS_ORIGIN
        value: "*"
      - key: DATABASE_URL
        sync: false
